<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'ChulaCharasNew', sans-serif; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h3 class="text-center mb-4 text-primary">📝 ฟอร์มบันทึกข้อมูลนักเรียน</h3>
        <form id="studentForm">
            
            <div class="mb-3">
                <label for="studentId" class="form-label">เลขประจำตัวนักเรียน (5 หลัก)</label>
                <input type="text" class="form-control" id="studentId" required pattern="\d{5}" title="กรุณากรอกตัวเลข 5 หลัก">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="firstName" class="form-label">ชื่อ</label>
                    <input type="text" class="form-control" id="firstName" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="lastName" class="form-label">นามสกุล</label>
                    <input type="text" class="form-control" id="lastName" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="classLevel" class="form-label">ชั้นเรียน</label>
                    <select class="form-select" id="classLevel" required>
                        <option value="" disabled selected>เลือกชั้นเรียน</option>
                        <option value="ม.1">ม.1</option>
                        <option value="ม.2">ม.2</option>
                        <option value="ม.3">ม.3</option>
                        <option value="ม.4">ม.4</option>
                        <option value="ม.5">ม.5</option>
                        <option value="ม.6">ม.6</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="room" class="form-label">ห้อง</label>
                    <input type="number" class="form-control" id="room" min="1" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="no" class="form-label">เลขที่</label>
                    <input type="number" class="form-control" id="no" min="1" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="weight" class="form-label">น้ำหนัก (ก.ก.)</label>
                    <input type="number" step="0.1" class="form-control" id="weight" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="height" class="form-label">ส่วนสูง (ซ.ม.)</label>
                    <input type="number" step="0.1" class="form-control" id="height" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">บันทึกข้อมูล</button>
        </form>
    </div>
</div>

<script>
document.getElementById('studentForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // 1. แสดง SweetAlert2 สถานะกำลังโหลด
    Swal.fire({
        title: 'กำลังบันทึกข้อมูล...',
        text: 'ระบบกำลังนำข้อมูลเข้าสู่ Google Sheets',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    // 2. ดึงข้อมูลจากฟอร์ม
    const studentId = document.getElementById('studentId').value;
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const classLevel = document.getElementById('classLevel').value;
    const room = document.getElementById('room').value;
    const no = document.getElementById('no').value;
    const weight = document.getElementById('weight').value;
    const height = document.getElementById('height').value;

    // ⚠️ ใส่ URL ของคุณตรงนี้
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwMlUIqObE8Yag3dzUo5zngtTSFUhm68s1oNh4_uQKgp_UVXCadhW7_ssz4pnzR0gc/exec";
    
    // สร้าง Query String เพื่อส่งแบบ GET
    const finalUrl = `${webAppUrl}?` +
                     `studentId=${encodeURIComponent(studentId)}` +
                     `&firstName=${encodeURIComponent(firstName)}` +
                     `&lastName=${encodeURIComponent(lastName)}` +
                     `&classLevel=${encodeURIComponent(classLevel)}` +
                     `&room=${encodeURIComponent(room)}` +
                     `&no=${encodeURIComponent(no)}` +
                     `&weight=${encodeURIComponent(weight)}` +
                     `&height=${encodeURIComponent(height)}`;

    // 3. ใช้ Fetch API ร่วมกับ mode: 'no-cors' 
    // เพื่อบังคับให้บราวเซอร์ส่งข้อมูลออกไปโดยไม่สนใจนโยบาย CORS ป้องกันการโดนบล็อกสคริปต์
    fetch(finalUrl, {
        method: 'GET',
        mode: 'no-cors', 
        headers: {
            'Content-Type': 'application/json'
        }
    })
    .then(() => {
        // เนื่องจากใช้โหมด no-cors บราวเซอร์จะไม่สามารถอ่านผลลัพธ์การตอบกลับได้ 
        // แต่ถ้าฟังก์ชัน fetch ทำงานสำเร็จ (เข้าบล็อก .then) แสดงว่าข้อมูลได้ถูกยิงไปถึง Google Apps Script เรียบร้อยแล้ว
        Swal.fire({
            icon: 'success',
            title: 'บันทึกสำเร็จ!',
            text: 'ระบบได้ทำการบันทึกข้อมูลนักเรียนลงในชีตเรียบร้อยแล้ว',
            timer: 2000,
            showConfirmButton: false
        });
        document.getElementById('studentForm').reset(); // ล้างฟอร์ม
    })
    .catch(error => {
        // ในกรณีที่ระบบเน็ตเวิร์กมีปัญหาจริงๆ 
        console.error('Error:', error);
        Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด!',
            text: 'ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ตของคุณ'
        });
    });
});
</script>

</body>
</html>
